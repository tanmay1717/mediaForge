name: Deploy Transform

"on":
  push:
    branches: [main]
    paths:
      - 'packages/edge-transform/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::807737159780:role/github-actions-mediaforge
          aws-region: us-east-1
      - run: npm run build
      - run: cd infrastructure && npx cdk deploy MediaForge-Transform-dev --require-approval never
